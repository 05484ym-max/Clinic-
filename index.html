<html lang="he" dir="rtl">

<meta charset="UTF-8">

<title>Miriam Omisi | קליניקת קוסמטיקה יוקרתית</title>

<!-- ========================================================= -->
<!-- ייבוא פונטים: פונט סריפי אלגנטי ללוגו + פונט נקי לטקסט -->
<!-- ========================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Assistant:wght@300;400;600;700&family=Allura&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* =========================================================
     הגדרות בסיס כלליות
  ========================================================= */
  :root{
    --gold: #A9781E;              /* ✏️ זהב אמיתי - יותר חום-ענברי, פחות צהוב */
    --gold-light: #E8CD8A;        /* ✏️ הברקה שמפניה-זהובה, לא צהובה בוהקת */
    --gold-deep: #4E3308;         /* ✏️ ברונזה כהה לעומק */
    /* גרדיאנט זהב מתכתי אמיתי - בסיס חום-זהוב עם נצנוץ שמפניה עדין, לא צהוב שטוח */
    --gold-gradient: linear-gradient(135deg, #4E3308 0%, #8A6113 18%, #C6A247 34%, #A9781E 48%, #F2E3B8 58%, #A9781E 68%, #7A5410 84%, #4E3308 100%);
    --black: #FBF6EA;
    --black-soft: #F7F0DE;
    --white: #ffffff;
    /* ✏️ צבע טקסט כהה חדש - גוון חום-זהב עמוק שמשתלב עם רקע השמנת ועם הזהב, קריא ונעים לעין */
    --text-dark: #4A3A18;
    --text-dark-soft: #6B5A30;
  }

  /* מחלקת עזר: טקסט בגרדיאנט זהב מתכתי (לכותרות ולוגו) */
  .gold-metal{
    background: var(--gold-gradient);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold);
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  html{
    scroll-behavior: smooth; /* גלילה חלקה בין אזורי הדף */
  }

  body{
    background-color: var(--black);
    color: var(--text-dark);
    font-family: 'Assistant', sans-serif;
    font-weight: 600; /* ✏️ טקסט מודגש יותר בכל האתר */
    overflow-x: hidden;
  }

  /* =========================================================
     תפריט עליון (Header) קבוע בראש הדף
  ========================================================= */
  header{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 1000;
    display:flex;
    align-items:center;
    justify-content:flex-end; /* דוחף את כל תוכן ה-Header לצד ימין */
    padding: 22px 6%;
    background: rgba(251,246,234,0.88);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(212,175,55,0.25);
  }

  /* --- כפתור המבורגר (שלושה פסים) - ממוקם בצד ימין למעלה --- */
  .hamburger{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    cursor:pointer;
    width: 40px;
    height: 40px;
    z-index: 1100;
  }
  .hamburger span{
    display:block;
    width: 32px;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-light));
    transition: all 0.35s ease;
  }
  /* אנימציית X בעת פתיחת התפריט */
  .hamburger.active span:nth-child(1){
    transform: translateY(8px) rotate(45deg);
  }
  .hamburger.active span:nth-child(2){
    opacity:0;
  }
  .hamburger.active span:nth-child(3){
    transform: translateY(-8px) rotate(-45deg);
  }

  /* --- תפריט נפתח (Dropdown) --- */
  /* התפריט תופס שליש מרוחב הדף (בדסקטופ), עם רקע שמנת חם (זכוכית) כך שהתוכן מאחוריו נראה */
  .nav-menu{
    position: fixed;
    top: 0;
    right: -33.334%;
    width: 33.334%;
    height: 100vh;
    background: rgba(251, 246, 234, 0.38); /* ✏️ שקוף יותר - מראה זכוכית */
    backdrop-filter: blur(24px) saturate(160%); /* ✏️ טשטוש חזק יותר + רוויה = מראה זכוכית מחוספסת */
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border-left: 1px solid rgba(255,255,255,0.4); /* ✏️ קו אור עדין בקצה כמו שפת זכוכית */
    box-shadow:
      -20px 0 60px rgba(154,116,20,0.18),
      inset 1px 0 0 rgba(255,255,255,0.25),
      inset -40px 0 80px -60px rgba(255,255,255,0.5); /* ✏️ הברקות פנימיות שיוצרות עומק של זכוכית */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 70px 5% 0;
    transition: right 0.5s cubic-bezier(.77,0,.18,1);
    z-index: 1050;
  }
  .nav-menu.open{
    right: 0;
  }
  /* ✏️ פס אור אלכסוני עדין שנע על פני התפריט - מדמה השתקפות אור על זכוכית */
  .nav-menu::before{
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.18) 48%, rgba(255,255,255,0.05) 55%, transparent 70%);
    pointer-events:none;
  }
  /* עמודת הקישורים + הקו האנכי לצידה, בהשראת השרטוט */
  .nav-menu-list{
    position: relative;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap: 20px;
    padding-right: 34px;
  }
  /* הקו האנכי הרציף לצד הכיתוב */
  .nav-menu-list::before{
    content:'';
    position:absolute;
    top:0;
    right:0;
    width: 1px;
    height: 100%;
    background: var(--gold);
    opacity: 0.8;
  }
  .nav-menu a{
    /* ✏️ זהב מתכתי אמיתי (גרדיאנט) במקום צבע זהב שטוח */
    background: var(--gold-gradient);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold-deep);
    text-decoration:none;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    text-align: right;
    white-space: nowrap;
    position: relative;
    transition: background-position 0.4s ease;
  }
  .nav-menu a:hover{
    background-position: right center; /* ✏️ הבהוב הזהב זז בהובר, כמו הברקה על מתכת */
  }



  /* שכבה שקופה מאוד מעל שאר הדף כשהתפריט פתוח (רק לצורך סגירה בלחיצה מחוץ לתפריט, כמעט בלתי מורגשת) */
  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.4s ease;
    z-index: 1040;
  }
  .overlay.show{
    opacity:1;
    pointer-events:all;
  }

  /* מובייל: גם כאן התפריט נשאר בשליש רוחב הדף */
  @media (max-width: 700px){
    .nav-menu{
      width: 33.334%;
      right: -33.334%;
    }
    .nav-menu.open{
      right: 0;
    }
  }

  /* =========================================================
     אזור פתיחה (Hero)
  ========================================================= */
  .hero{
    position: relative; /* ✏️ נדרש כדי למקם את שכבת התמונה השקופה מאחורי הטקסט */
    height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    padding: 18vh 20px 0;
    background:
      radial-gradient(ellipse at center, rgba(212,175,55,0.12) 0%, rgba(0,0,0,0) 60%),
      var(--black);
    overflow: hidden;
  }

  /* ✏️ תמונת הרקע השקופה בעמוד הבית - ממוקמת מאחורי כל הטקסט ולא מפריעה לקריאה */

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miriam Omisi | קליניקת קוסמטיקה יוקרתית</title>

<!-- ========================================================= -->
<!-- ייבוא פונטים: פונט סריפי אלגנטי ללוגו + פונט נקי לטקסט -->
<!-- ========================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Assistant:wght@300;400;600;700&family=Allura&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* =========================================================
     הגדרות בסיס כלליות
  ========================================================= */
  :root{
    --gold: #A9781E;              /* ✏️ זהב אמיתי - יותר חום-ענברי, פחות צהוב */
    --gold-light: #E8CD8A;        /* ✏️ הברקה שמפניה-זהובה, לא צהובה בוהקת */
    --gold-deep: #4E3308;         /* ✏️ ברונזה כהה לעומק */
    /* גרדיאנט זהב מתכתי אמיתי - בסיס חום-זהוב עם נצנוץ שמפניה עדין, לא צהוב שטוח */
    --gold-gradient: linear-gradient(135deg, #4E3308 0%, #8A6113 18%, #C6A247 34%, #A9781E 48%, #F2E3B8 58%, #A9781E 68%, #7A5410 84%, #4E3308 100%);
    --black: #FBF6EA;
    --black-soft: #F7F0DE;
    --white: #ffffff;
    /* ✏️ צבע טקסט כהה חדש - גוון חום-זהב עמוק שמשתלב עם רקע השמנת ועם הזהב, קריא ונעים לעין */
    --text-dark: #4A3A18;
    --text-dark-soft: #6B5A30;
  }

  /* מחלקת עזר: טקסט בגרדיאנט זהב מתכתי (לכותרות ולוגו) */
  .gold-metal{
    background: var(--gold-gradient);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold);
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  html{
    scroll-behavior: smooth; /* גלילה חלקה בין אזורי הדף */
  }

  body{
    background-color: var(--black);
    color: var(--text-dark);
    font-family: 'Assistant', sans-serif;
    font-weight: 600; /* ✏️ טקסט מודגש יותר בכל האתר */
    overflow-x: hidden;
  }

  /* =========================================================
     תפריט עליון (Header) קבוע בראש הדף
  ========================================================= */
  header{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 1000;
    display:flex;
    align-items:center;
    justify-content:flex-end; /* דוחף את כל תוכן ה-Header לצד ימין */
    padding: 22px 6%;
    background: rgba(251,246,234,0.88);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(212,175,55,0.25);
  }

  /* --- כפתור המבורגר (שלושה פסים) - ממוקם בצד ימין למעלה --- */
  .hamburger{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    cursor:pointer;
    width: 40px;
    height: 40px;
    z-index: 1100;
  }
  .hamburger span{
    display:block;
    width: 32px;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-light));
    transition: all 0.35s ease;
  }
  /* אנימציית X בעת פתיחת התפריט */
  .hamburger.active span:nth-child(1){
    transform: translateY(8px) rotate(45deg);
  }
  .hamburger.active span:nth-child(2){
    opacity:0;
  }
  .hamburger.active span:nth-child(3){
    transform: translateY(-8px) rotate(-45deg);
  }

  /* --- תפריט נפתח (Dropdown) --- */
  /* התפריט תופס שליש מרוחב הדף (בדסקטופ), עם רקע שמנת חם (זכוכית) כך שהתוכן מאחוריו נראה */
  .nav-menu{
    position: fixed;
    top: 0;
    right: -33.334%;
    width: 33.334%;
    height: 100vh;
    background: rgba(251, 246, 234, 0.38); /* ✏️ שקוף יותר - מראה זכוכית */
    backdrop-filter: blur(24px) saturate(160%); /* ✏️ טשטוש חזק יותר + רוויה = מראה זכוכית מחוספסת */
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border-left: 1px solid rgba(255,255,255,0.4); /* ✏️ קו אור עדין בקצה כמו שפת זכוכית */
    box-shadow:
      -20px 0 60px rgba(154,116,20,0.18),
      inset 1px 0 0 rgba(255,255,255,0.25),
      inset -40px 0 80px -60px rgba(255,255,255,0.5); /* ✏️ הברקות פנימיות שיוצרות עומק של זכוכית */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 70px 5% 0;
    transition: right 0.5s cubic-bezier(.77,0,.18,1);
    z-index: 1050;
  }
  .nav-menu.open{
    right: 0;
  }
  /* ✏️ פס אור אלכסוני עדין שנע על פני התפריט - מדמה השתקפות אור על זכוכית */
  .nav-menu::before{
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.18) 48%, rgba(255,255,255,0.05) 55%, transparent 70%);
    pointer-events:none;
  }
  /* עמודת הקישורים + הקו האנכי לצידה, בהשראת השרטוט */
  .nav-menu-list{
    position: relative;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap: 20px;
    padding-right: 34px;
  }
  /* הקו האנכי הרציף לצד הכיתוב */
  .nav-menu-list::before{
    content:'';
    position:absolute;
    top:0;
    right:0;
    width: 1px;
    height: 100%;
    background: var(--gold);
    opacity: 0.8;
  }
  .nav-menu a{
    /* ✏️ זהב מתכתי אמיתי (גרדיאנט) במקום צבע זהב שטוח */
    background: var(--gold-gradient);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold-deep);
    text-decoration:none;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    text-align: right;
    white-space: nowrap;
    position: relative;
    transition: background-position 0.4s ease;
  }
  .nav-menu a:hover{
    background-position: right center; /* ✏️ הבהוב הזהב זז בהובר, כמו הברקה על מתכת */
  }



  /* שכבה שקופה מאוד מעל שאר הדף כשהתפריט פתוח (רק לצורך סגירה בלחיצה מחוץ לתפריט, כמעט בלתי מורגשת) */
  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.4s ease;
    z-index: 1040;
  }
  .overlay.show{
    opacity:1;
    pointer-events:all;
  }
